  about:
    heading: "Desarrollo cosas en internet."
    full_name: "Romer Ramos"
    subtitle_html: 'I <span class="text-brand font-medium">build</span> things on
      the internet.'
    intro_html: |
      Empecé en Venezuela «fogueándome» con esos trabajos en los que te toca hacer de todo. Sistemas embebidos, Windows CE, fusiones bancarias, apps para Blackberry. Si nunca has depurado Java en una Blackberry, felicidades, has tenido una vida mejor que la mía.
    geeks_html: |
      Pasé por <span class="text-brand font-medium">4Geeks</span>, donde básicamente dirigía equipos de ingeniería en tres ciudades e intentaba que todos dejaran de reinventar la rueda en cada sprint.
    academia_html: |
      Eso me llevó a fundar <span class="text-brand font-medium">Academia Hack</span>, un bootcamp de programación donde enseñé a cientos de personas a programar. Más del 60% consiguió trabajo en tecnología, y aprendí que dirigir una escuela es ser terapeuta, project manager y motivador al mismo tiempo.
    spain_html: |
      Tras el capítulo del bootcamp, hice las maletas y me mudé a España, y en algún punto entre adaptarme a un país nuevo y a una vida nueva, me compré una cámara y me enamoré de la fotografía. Resulta que pasar todo el día observando la luz y la composición te cambia por completo la forma de entender el diseño. Quién lo diría.
    aurora_html: |
      Luego monté <span class="text-brand font-medium">aurorajobs</span>, una plataforma de reclutamiento para estudiantes universitarios: pasamos de cero a más de 20K usuarios, con un equipo de cuatro personas y cinco años de trabajo sin parar.
    drawing_html: |
      En algún momento de esos años también empecé a <span class="text-brand font-medium">dibujar semanalmente</span>, y no he parado en casi tres años. Es mi forma de desconectar en un mundo donde todo compila o se despliega.
    lowfoot_html: |
      Hoy soy <span class="text-brand font-medium">Technical Lead en Lowfoot</span>, una plataforma de análisis energético donde me encargo de las APIs principales, la infraestructura y lidero al equipo web en tres continentes. Mucho SvelteKit, mucho Kubernetes.
    mypotential_html: |
      En paralelo, estoy desarrollando <span class="text-brand font-medium">MyPotential</span>, una plataforma de IA que ayuda a estudiantes de bachillerato españoles a descubrir qué hacer con sus vidas. Ya la estoy probando en aulas de Madrid.
    outro_html: |
      Vivo en Madrid. Me gustan los equipos pequeños, salir a producción rápido y crear cosas que resuelvan problemas reales. Cuando no estoy haciendo eso, probablemente esté dibujando o buscando buena luz con una cámara.
    coffee_html: |
      Si has llegado hasta aquí, vamos a tomarnos un <span class="text-brand font-medium">café</span>, ¡invito yo! (Puede que conozca una... o 10 cafeterías buenas).

  layouts:
    application:
      title: "Romer Ramos"
